<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 420" role="img" aria-labelledby="title desc">
  <title id="title">heteff logo</title>
  <desc id="desc">Hexagonal logo with forest trees, an effect curve, and the package name heteff.</desc>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f4f7fb"/>
      <stop offset="100%" stop-color="#dfe9f4"/>
    </linearGradient>
    <linearGradient id="ridge" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#355070"/>
      <stop offset="100%" stop-color="#5b8e7d"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="10" flood-color="#738090" flood-opacity="0.18"/>
    </filter>
  </defs>

  <polygon
    points="210,16 369,108 369,292 210,384 51,292 51,108"
    fill="url(#bg)"
    stroke="#2f4858"
    stroke-width="14"
    filter="url(#shadow)"/>

  <path
    d="M88 255 C128 205, 172 187, 210 198 C254 211, 292 185, 334 144"
    fill="none"
    stroke="url(#ridge)"
    stroke-width="15"
    stroke-linecap="round"/>

  <circle cx="332" cy="146" r="10" fill="#a23e48"/>

  <g fill="#355070">
    <polygon points="116,246 136,210 156,246"/>
    <rect x="132" y="246" width="8" height="24" rx="2"/>

    <polygon points="168,234 194,186 220,234"/>
    <rect x="190" y="234" width="8" height="38" rx="2"/>

    <polygon points="232,243 252,206 272,243"/>
    <rect x="248" y="243" width="8" height="28" rx="2"/>
  </g>

  <g fill="#5b8e7d">
    <circle cx="122" cy="176" r="10"/>
    <circle cx="150" cy="164" r="8"/>
    <circle cx="270" cy="112" r="9"/>
    <circle cx="298" cy="100" r="7"/>
  </g>

  <text x="210" y="328" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="52" font-weight="700" fill="#1f2937">
    heteff
  </text>
</svg>
