url: https://dai540.github.io/heteff/

template:
  bootstrap: 5
  bootswatch: flatly

development:
  mode: unreleased

home:
  title: heteff
  description: Simple generalized random forest workflows for observational, survival, and instrumental heterogeneous effect analysis.
  sidebar:
    structure: [authors, dev]

navbar:
  structure:
    left: [intro, reference, articles]
    right: [search]
  components:
    intro:
      text: Get Started
      href: index.html
    reference:
      text: Reference
      href: reference/index.html

articles:
  - title: Core tutorials
    navbar: Core
    contents:
      - getting-started
      - theory-and-design
  - title: Observational forests
    navbar: Observational
    contents:
      - case-study-nhefs
      - case-study-nsw
  - title: Survival forests
    navbar: Survival
    contents:
      - case-study-veteran
      - case-study-rotterdam
  - title: Instrumental forests
    navbar: Instrumental
    contents:
      - case-study-card-data
      - case-study-schooling-returns

